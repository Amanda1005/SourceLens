<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SourceLens — Daily Open-Source Discovery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f2eeff;
      --surface:  rgba(255,255,255,0.5);
      --border:   rgba(255,255,255,0.75);
      --text:     #1e1035;
      --muted:    #6b7280;
      --accent:   #7c3aed;
      --radius:   14px;
    }

    body {
      background: #fdfaf7;
      color: var(--text);
      font-family: "PingFang TC", "Noto Sans TC", -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.7;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background blobs ── */
    body::before {
      content: '';
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(196, 181, 253, 0.38) 0%, transparent 52%),
        radial-gradient(ellipse at 82% 12%, rgba(147, 197, 253, 0.32) 0%, transparent 52%),
        radial-gradient(ellipse at 68% 82%, rgba(249, 168, 212, 0.28) 0%, transparent 52%),
        radial-gradient(ellipse at 8%  72%, rgba(110, 231, 183, 0.24) 0%, transparent 52%),
        radial-gradient(ellipse at 50% 50%, rgba(253, 230, 138, 0.15) 0%, transparent 45%);
      animation: blobDrift 18s ease-in-out infinite alternate;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes blobDrift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(2%, 3%) scale(1.03); }
      100% { transform: translate(-2%, 1%) scale(0.98); }
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: perspective(900px) translateZ(-100px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: perspective(900px) translateZ(0) scale(1);
      }
    }

    a { color: #7c3aed; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Sticky wrapper for header + nav ── */
    .sticky-top {
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* ── Header ── */
    header {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 1px 24px rgba(124,58,237,0.08);
      padding: 18px 24px;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-logo { width: 88px; height: 88px; object-fit: contain; display: block; flex-shrink: 0; }
    .brand h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #1e1035 0%, #7c3aed 55%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand p  { font-size: 0.78rem; color: var(--muted); }
    #last-updated { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

    /* ── Nav tabs ── */
    nav {
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.7);
      padding: 0 24px;
    }
    .tab-row {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-row:first-child { border-bottom: 1px solid rgba(0,0,0,0.05); }
    .tab-row::-webkit-scrollbar { display: none; }
    .tab-row-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
      min-width: 58px;
      padding-right: 4px;
    }
    .tab {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.88rem;
      padding: 11px 16px;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .tab:hover { color: #1e1035; }
    .tab.active { color: #7c3aed; border-bottom-color: #7c3aed; font-weight: 600; text-shadow: 0 0 10px rgba(124,58,237,0.35); }
    /* language row uses smaller accent colour */
    #tabs-lang .tab.active { color: #0ea5e9; border-bottom-color: #0ea5e9; text-shadow: 0 0 10px rgba(14,165,233,0.3); }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 28px auto;
      padding: 0 24px;
    }
    #stats {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Card grid ── */
    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(100,60,200,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
      transition: border-color 0.25s, box-shadow 0.25s;
      position: relative;
      transform-style: preserve-3d;
      will-change: transform;
      animation: cardEntrance 1.0s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(255,255,255,0.45) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    .card-shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: 1;
      transition: background 0.08s;
    }
    .card:hover {
      border-color: rgba(167,139,250,0.7);
      box-shadow: 0 16px 48px rgba(100,60,200,0.14), 0 0 24px rgba(139,92,246,0.15), inset 0 1px 0 rgba(255,255,255,1);
    }

    /* colored top bar per category */
    .card-bar {
      height: 4px;
      width: 100%;
      flex-shrink: 0;
    }
    .bar-AI\ Tools            { background: linear-gradient(90deg, #7c3aed, #a78bfa); }
    .bar-Dev\ Tools           { background: linear-gradient(90deg, #0ea5e9, #38bdf8); }
    .bar-Data\ \&\ Analytics  { background: linear-gradient(90deg, #10b981, #34d399); }
    .bar-Security             { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .bar-Design\ \&\ Creative { background: linear-gradient(90deg, #ec4899, #f472b6); }

    .card-body {
      padding: 18px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    /* header row: name + badge */
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .repo-name {
      font-weight: 700;
      font-size: 0.95rem;
      color: #1e1035;
      word-break: break-all;
      line-height: 1.4;
    }
    .repo-name:hover { color: #7c3aed; text-decoration: none; }

    /* category badge */
    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-AI\ Tools            { background: rgba(124,58,237,0.1);  color: #6d28d9; border: 1px solid rgba(124,58,237,0.3); }
    .badge-Dev\ Tools           { background: rgba(14,165,233,0.1);  color: #0369a1; border: 1px solid rgba(14,165,233,0.3); }
    .badge-Data\ \&\ Analytics  { background: rgba(16,185,129,0.1);  color: #065f46; border: 1px solid rgba(16,185,129,0.3); }
    .badge-Security             { background: rgba(245,158,11,0.1);  color: #92400e; border: 1px solid rgba(245,158,11,0.3); }
    .badge-Design\ \&\ Creative { background: rgba(236,72,153,0.1);  color: #9d174d; border: 1px solid rgba(236,72,153,0.3); }

    /* descriptions — zh primary, en secondary */
    .desc-zh {
      font-size: 0.92rem;
      color: var(--text);
      font-weight: 500;
      line-height: 1.6;
    }
    .desc-en {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* meta: stars + language */
    .meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: auto;
      padding-top: 6px;
      flex-wrap: wrap;
    }
    .stars { display: flex; align-items: center; gap: 4px; }
    .lang-pill {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .lang-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #aaa;
      flex-shrink: 0;
    }

    /* button */
    .btn-github {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      padding: 7px 14px;
      background: rgba(255,255,255,0.65);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 8px;
      font-size: 0.8rem;
      color: #1e1035;
      text-decoration: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      align-self: flex-start;
      font-family: inherit;
    }
    .btn-github:hover {
      background: rgba(167,139,250,0.2);
      border-color: rgba(124,58,237,0.45);
      box-shadow: 0 0 14px rgba(124,58,237,0.18);
      color: #7c3aed;
      text-decoration: none;
    }

    /* empty / loading */
    #message {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 1rem;
    }

    /* footer */
    footer {
      text-align: center;
      padding: 28px 24px;
      color: var(--muted);
      font-size: 0.78rem;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.75);
      margin-top: 48px;
    }

    @media (max-width: 600px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      #cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="sticky-top">
<header>
  <div class="header-inner">
    <div class="brand">
      <img src="sourcelens.png" alt="SourceLens" class="brand-logo" />
      <div>
        <h1>SourceLens</h1>
        <p>Created within 90 days · 10+ stars · Keyword-matched · AI-classified daily</p>
      </div>
    </div>
    <span id="last-updated">Loading…</span>
  </div>
</header>

<nav>
  <div class="tab-row" id="tabs-cat">
    <button class="tab active" data-val="All">All</button>
    <button class="tab" data-val="AI Tools">AI Tools</button>
    <button class="tab" data-val="Dev Tools">Dev Tools</button>
    <button class="tab" data-val="Data & Analytics">Data & Analytics</button>
    <button class="tab" data-val="Security">Security</button>
    <button class="tab" data-val="Design & Creative">Design & Creative</button>
  </div>
  <div class="tab-row" id="tabs-lang">
    <button class="tab active" data-val="All">All</button>
    <button class="tab" data-val="JavaScript">JavaScript / TypeScript</button>
    <button class="tab" data-val="Python">Python</button>
    <button class="tab" data-val="HTML">HTML / CSS</button>
    <button class="tab" data-val="Others">Others</button>
  </div>
</nav>
</div>

<main>
  <p id="stats"></p>
  <div id="message">Loading…</div>
  <div id="cards"></div>
</main>

<footer>
  SourceLens · Auto-updated daily via GitHub Actions &nbsp;|&nbsp;
  Data: <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub Search API</a> &nbsp;·&nbsp;
  AI: <a href="https://azure.microsoft.com/products/ai-foundry" target="_blank" rel="noopener noreferrer">Microsoft Azure AI Foundry</a> (Phi-4-mini-instruct)
</footer>

<script>
  const LANG_COLORS = {
    JavaScript: "#f1e05a", TypeScript: "#3178c6", Python: "#3572A5",
    Rust: "#dea584", Go: "#00ADD8", Java: "#b07219", "C++": "#f34b7d",
    C: "#555555", "C#": "#178600", Ruby: "#701516", Swift: "#F05138",
    Kotlin: "#A97BFF", PHP: "#4F5D95", Shell: "#89e051", HTML: "#e34c26",
    CSS: "#563d7c", Dart: "#00B4AB", Scala: "#c22d40", Elixir: "#6e4a7e",
    Haskell: "#5e5086", Lua: "#000080", R: "#198CE7",
  };

  const CAT_LABEL = {
    "All":               "All",
    "AI Tools":          "AI Tools",
    "Dev Tools":         "Dev Tools",
    "Data & Analytics":  "Data & Analytics",
    "Security":          "Security",
    "Design & Creative": "Design & Creative",
  };

  const JS_LANGS  = new Set(["javascript","typescript","coffeescript","vue"]);
  const PY_LANGS  = new Set(["python"]);
  const HTML_LANGS = new Set(["html","css","scss","sass"]);

  function matchesLang(repoLang, filter) {
    if (filter === "All") return true;
    const l = (repoLang || "").toLowerCase();
    if (filter === "JavaScript") return JS_LANGS.has(l);
    if (filter === "Python")     return PY_LANGS.has(l);
    if (filter === "HTML")       return HTML_LANGS.has(l);
    if (filter === "Others")     return !JS_LANGS.has(l) && !PY_LANGS.has(l) && !HTML_LANGS.has(l);
    return true;
  }

  let allRepos = [];
  let activeCat  = "All";
  let activeLang = "All";

  async function loadData() {
    try {
      const resp = await fetch("data/repos.json");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      allRepos = await resp.json();
      renderTimestamp(resp.headers.get("last-modified"));
      document.getElementById("message").style.display = "none";
      render();
    } catch (err) {
      document.getElementById("message").textContent =
        "Failed to load repos.json. Please run the GitHub Actions workflow first.";
      console.error(err);
    }
  }

  function renderTimestamp(lastModified) {
    const el = document.getElementById("last-updated");
    if (lastModified) {
      const d = new Date(lastModified);
      const formatted = d.toLocaleString("en-US", {
        year: "numeric", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit", timeZoneName: "short"
      });
      el.textContent = "Updated: " + formatted;
    } else {
      el.textContent = "";
    }
  }

  function addTilt(card) {
    card.addEventListener("mouseenter", () => {
      card.style.transition = "border-color 0.25s, box-shadow 0.25s";
    });
    card.addEventListener("mousemove", e => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      const rX = (-y * 11).toFixed(2);
      const rY = (x * 11).toFixed(2);
      card.style.transform = `perspective(700px) rotateX(${rX}deg) rotateY(${rY}deg) translateY(-6px)`;
      const shine = card.querySelector(".card-shine");
      if (shine) {
        const px = ((x + 0.5) * 100).toFixed(1);
        const py = ((y + 0.5) * 100).toFixed(1);
        shine.style.background = `radial-gradient(circle at ${px}% ${py}%, rgba(255,255,255,0.32) 0%, transparent 65%)`;
      }
    });
    card.addEventListener("mouseleave", () => {
      card.style.transition = "transform 0.5s ease, border-color 0.25s, box-shadow 0.25s";
      card.style.transform = "";
      const shine = card.querySelector(".card-shine");
      if (shine) shine.style.background = "";
    });
  }

  function buildCard(repo, index = 0) {
    const langColor = LANG_COLORS[repo.language] || "#aaa";
    const category  = repo.category || repo.category_hint || "Dev Tools";
    const catLabel  = CAT_LABEL[category] || category;
    const descPrimary = repo.desc_en || repo.desc_zh || "";
    const descSub     = (!repo.desc_en && repo.desc_zh) ? "" : (repo.description || "");
    const stars     = (repo.stars ?? 0).toLocaleString("en-US");
    const lang      = repo.language || "—";

    const card = document.createElement("article");
    card.className = "card";
    card.style.animationDelay = `${Math.min(index * 0.12, 0.96)}s`;
    card.innerHTML = `
      <div class="card-shine"></div>
      <div class="card-bar bar-${escHtml(category)}"></div>
      <div class="card-body">
        <div class="card-header">
          <a class="repo-name" href="${safeUrl(repo.url)}" target="_blank" rel="noopener noreferrer">
            ${escHtml(repo.full_name)}
          </a>
          <span class="badge badge-${escHtml(category)}">${escHtml(catLabel)}</span>
        </div>
        ${descPrimary ? `<p class="desc-zh">${escHtml(descPrimary)}</p>` : ""}
        ${descSub ? `<p class="desc-en">${escHtml(descSub)}</p>` : ""}
        <div class="meta">
          <span class="stars">⭐ ${stars}</span>
          <span class="lang-pill">
            <span class="lang-dot" style="background:${langColor}"></span>
            ${escHtml(lang)}
          </span>
        </div>
        <a class="btn-github" href="${safeUrl(repo.url)}" target="_blank" rel="noopener noreferrer">
          View on GitHub →
        </a>
      </div>
    `;
    addTilt(card);
    return card;
  }

  function render() {
    let filtered = allRepos;
    if (activeCat  !== "All") filtered = filtered.filter(r => (r.category || r.category_hint) === activeCat);
    if (activeLang !== "All") filtered = filtered.filter(r => matchesLang(r.language, activeLang));

    const container = document.getElementById("cards");
    const msg       = document.getElementById("message");
    const stats     = document.getElementById("stats");

    container.innerHTML = "";

    if (filtered.length === 0) {
      msg.textContent = "No projects match this filter.";
      msg.style.display = "";
      stats.textContent = "";
      return;
    }

    msg.textContent = "";
    msg.style.display = "none";
    const parts = [];
    if (activeCat  !== "All") parts.push(`"${CAT_LABEL[activeCat]}"`);
    if (activeLang !== "All") parts.push(`${activeLang}`);
    const label = parts.length ? ` · ${parts.join(" + ")}` : "";
    stats.textContent = `${filtered.length} repos found${label} · ${allRepos.length} total (90-day rolling)`;

    const frag = document.createDocumentFragment();
    filtered.forEach((r, i) => frag.appendChild(buildCard(r, i)));
    container.appendChild(frag);
  }

  document.getElementById("tabs-cat").addEventListener("click", e => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    document.querySelectorAll("#tabs-cat .tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    activeCat = btn.dataset.val;
    render();
  });

  document.getElementById("tabs-lang").addEventListener("click", e => {
    const btn = e.target.closest(".tab");
    if (!btn) return;
    document.querySelectorAll("#tabs-lang .tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    activeLang = btn.dataset.val;
    render();
  });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function safeUrl(url) {
    try {
      const u = new URL(String(url));
      return (u.protocol === "https:" && u.hostname.endsWith("github.com"))
        ? u.href : "#";
    } catch { return "#"; }
  }

  loadData();
</script>
</body>
</html>
