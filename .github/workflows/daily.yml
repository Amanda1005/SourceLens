name: Daily Repo Update

on:
  schedule:
    - cron: "0 0 * * *"   # every day at 00:00 UTC
  workflow_dispatch:        # allow manual runs from the GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push data/repos.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Fetch repos from GitHub
        run: python src/fetch_repos.py

      - name: Classify repos with Phi-4-mini-instruct (Azure AI Foundry)
        env:
          AZURE_AI_KEY: ${{ secrets.AZURE_AI_KEY }}
        run: python src/classify.py

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repos.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: daily repo update $(date -u '+%Y-%m-%d')"
          git push
